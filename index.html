<!DOCTYPE html>
<html lang="en" ng-app="taskApp">
<head>
    <meta charset="UTF-8">
    <title>TaskMaster Hub - To Do List</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        input[type="text"] {
            width: 70%;
            padding: 8px;
        }
        button {
            padding: 8px 10px;
            margin-left: 5px;
            cursor: pointer;
        }
        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body ng-controller="taskController">

<div class="container">
    <h2>TaskMaster Hub</h2>

    <!-- Add Task -->
    <input type="text" ng-model="newTask" placeholder="Enter new task">
    <button ng-click="addTask()">Add</button>

    <br><br>

    <!-- Filter Buttons -->
    <button ng-click="filterStatus = ''">All</button>
    <button ng-click="filterStatus = false">Pending</button>
    <button ng-click="filterStatus = true">Completed</button>

    <br><br>

    <!-- Task List -->
    <ul>
        <li ng-repeat="task in tasks | filter:{completed: filterStatus}">
            <input type="checkbox" ng-model="task.completed">

            <span ng-class="{completed: task.completed}">
                {{task.name}}
            </span>

            <button ng-click="editTask(task)">Edit</button>
            <button ng-click="deleteTask($index)">Delete</button>
        </li>
    </ul>
</div>

<script>
    // AngularJS Application
    var app = angular.module("taskApp", []);

    app.controller("taskController", function($scope) {

        // Task list
        $scope.tasks = [];

        // Add Task
        $scope.addTask = function() {
            if ($scope.newTask) {
                $scope.tasks.push({
                    name: $scope.newTask,
                    completed: false
                });
                $scope.newTask = "";
            }
        };

        // Delete Task
        $scope.deleteTask = function(index) {
            $scope.tasks.splice(index, 1);
        };

        // Edit Task
        $scope.editTask = function(task) {
            var updatedTask = prompt("Edit task", task.name);
            if (updatedTask !== null) {
                task.name = updatedTask;
            }
        };
    });
</script>

</body>
</html>
