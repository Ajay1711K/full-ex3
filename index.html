<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KCET Learning - Quiz App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border-radius: 15px;
            padding: 30px;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- WELCOME SECTION -->
    <div id="welcome-section" class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <h2 class="text-primary mb-3">Welcome to KCET Learning 🎓</h2>

                <p class="fs-5">
                    Test your knowledge with our interactive quiz.<br>
                    Click the button below to begin!
                </p>

                <button id="startBtn" class="btn btn-primary btn-lg mt-3">
                    Next ➡️
                </button>
            </div>
        </div>
    </div>

    <!-- QUIZ SECTION -->
    <div id="quiz-section" class="row justify-content-center d-none">
        <div class="col-md-8">
            <div class="card shadow">

                <h4 class="text-center text-primary mb-4">
                    KCET Learning – Quiz Application
                </h4>

                <h5 id="question"></h5>
                <div id="options" class="my-3"></div>

                <div class="d-flex justify-content-between">
                    <button id="prevBtn" class="btn btn-secondary">Previous</button>
                    <button id="nextBtn" class="btn btn-primary">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- RESULT SECTION -->
    <div id="result-section" class="row justify-content-center d-none">
        <div class="col-md-6">
            <div class="card shadow text-center">
                <h4 class="mb-3">Quiz Completed 🎉</h4>

                <p id="correctCount" class="fw-bold text-success"></p>
                <p id="wrongCount" class="fw-bold text-danger"></p>
                <p id="totalCount" class="fw-bold"></p>

                <button id="restartBtn" class="btn btn-success mt-3">
                    Restart Quiz
                </button>
            </div>
        </div>
    </div>

</div>

<script>
$(document).ready(function () {

    /* ================= START BUTTON ================= */
    $("#startBtn").click(function () {
        $("#welcome-section").hide();
        $("#quiz-section").removeClass("d-none");
        loadQuestion();
    });

    /* ================= QUIZ DATA ================= */
    const quizData = [
        {
            question: "What does HTML stand for?",
            options: [
                "Hyper Text Markup Language",
                "High Text Machine Language",
                "Hyperlinks and Text Markup Language",
                "Home Tool Markup Language"
            ],
            correct: 0
        },
        {
            question: "Which language is used for styling web pages?",
            options: ["HTML", "CSS", "JavaScript", "Python"],
            correct: 1
        },
        {
            question: "Which library is used to simplify JavaScript DOM manipulation?",
            options: ["Bootstrap", "Angular", "jQuery", "React"],
            correct: 2
        },
        {
            question: "Which HTML tag is used to create a hyperlink?",
            options: ["<a>", "<link>", "<href>", "<url>"],
            correct: 0
        },
        {
            question: "Which symbol is used to select an ID in CSS?",
            options: [".", "#", "*", "&"],
            correct: 1
        }
    ];

    let currentIndex = 0;
    let userAnswers = [];

    function loadQuestion() {
        let q = quizData[currentIndex];
        $("#question").text(`Q${currentIndex + 1}. ${q.question}`);
        $("#options").empty();

        $.each(q.options, function (i, option) {
            let checked = userAnswers[currentIndex] === i ? "checked" : "";
            $("#options").append(`
                <div class="form-check">
                    <input type="radio" class="form-check-input" name="answer" value="${i}" ${checked}>
                    <label class="form-check-label">${option}</label>
                </div>
            `);
        });

        $("#prevBtn").prop("disabled", currentIndex === 0);
        $("#nextBtn").text(
            currentIndex === quizData.length - 1 ? "Submit" : "Next"
        );
    }

    function validateAnswer() {
        let selected = $("input[name='answer']:checked").val();
        if (selected === undefined) {
            alert("Please select an answer!");
            return false;
        }
        userAnswers[currentIndex] = parseInt(selected);
        return true;
    }

    $("#nextBtn").click(function () {
        if (!validateAnswer()) return;

        if (currentIndex < quizData.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    });

    $("#prevBtn").click(function () {
        if (currentIndex > 0) {
            currentIndex--;
            loadQuestion();
        }
    });

    function showResult() {
        let correct = 0;

        $.each(quizData, function (i, q) {
            if (userAnswers[i] === q.correct) correct++;
        });

        let total = quizData.length;
        let wrong = total - correct;

        $("#quiz-section").hide();
        $("#correctCount").text("Correct Answers : " + correct);
        $("#wrongCount").text("Wrong Answers : " + wrong);
        $("#totalCount").text("Total Questions : " + total);

        $("#result-section").removeClass("d-none");
    }

    $("#restartBtn").click(function () {
        location.reload();
    });

});
</script>

</body>
</html>
